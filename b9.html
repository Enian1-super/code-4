<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <div class="container">
        <h2>Basic progress bar</h2>
        <p> The outer element uses the class `.progress`.
        
        The inner element uses the class `.progress-bar`.
        
        The width of the progress bar is controlled using CSS `width`.</p>
    </div>
    <div class="progress">
        <div class="progress-bar" style="width: 70%;">
            70%
        </div>
    </div>
</body>
</html>
